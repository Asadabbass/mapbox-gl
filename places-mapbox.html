    <script type="text/javascript">

        var currentMarker = [] // empty array to store marker
        var marker;
        $('#cCWraper').on('click', function (e) {
            e.stopPropagation();
            $('.catLists').show(); // show categories
            div = document.getElementById("categoriesList");
            a = div.getElementsByTagName("li");
            for (i = 0; i < a.length; i++) {
                a[i].style.display = 'block'
            }
        })
        function setCatListMap() {
            var input, filter, ul, li, a, i;
            input = document.getElementById("search");
            filter = input.value.toUpperCase();
            div = document.getElementById("categoriesList");
            a = div.getElementsByTagName("li");
            // a = d.map((i)=> i.innerHTML)
            for (i = 0; i < a.length; i++) {
                txtValue = a[i].textContent || a[i].innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    a[i].style.display = "";
                } else {
                    a[i].style.display = "none";
                }
            }
        }
        $('#ddContainer').one('click', function (e) {
            e.stopPropagation();
            const x = document.createElement('input'); //custom input in category list
            x.setAttribute('type', 'text'); // set input type text
            x.setAttribute('id', 'search'); // set input id search
            x.setAttribute('autocomplete', 'off');
            x.setAttribute('onkeypress', 'return AddKeyPress(event)');
            x.setAttribute('class', 'appendInput'); // set input classname appendInput
            x.setAttribute('onkeyup', 'setCatListMap()');
            document.getElementById('categoriesList').appendChild(x); // set input as a first child to categories list
            const ul = document.createElement('ul'); // create a custom un-order list
            ul.setAttribute('class', 'cList') // set ul classname
            ul.setAttribute('id', 'getCategory')
            document.getElementById('categoriesList').appendChild(ul); // set ul as a child of categories list
            // if (ul.innerHTML === '' && ul.length !==0)
            categories.map((c) => { // get each category from category array
                const li = document.createElement('li'); // create a custom list item
                li.setAttribute('class', 'catItem') // set classname catItem to li
                ul.appendChild(li); // make li as a child to ul
                li.innerHTML = c; // assign value to li 
            })
            $('input').on('keyup', function (e) {
                const search = encodeURI(this.value);
                document.getElementById('selectedCat').value = decodeURIComponent(e.target.value);

            })
        })
        function AddKeyPress(e) {
            // look for window.event in case event isn't passed in
            e = e || window.event;
            if (e.keyCode == 13) {
                $(".catLists").hide();
                const value = encodeURIComponent(document.getElementById('selectedCat').value);
                const LanLat = map.getBounds().toArray(); // get longitude & latitude (boundries) from map
                const dbox = encodeURIComponent(LanLat[0].join(',') + ',' + LanLat[1].join(',')) // convert into sting
                $.ajax('https://api.mapbox.com/geocoding/v5/mapbox.places/' + value + '.json?type=poi&bbox=' + dbox + '&access_token=pk.eyJ1IjoiaGFyZGV2ZXJpY2siLCJhIjoiY2lyZmNta20wMDA4dWc5bmV1cWduOWxvNSJ9.eJRT3Wys7QU3GvqRmUMYsw', {
                    success: function (response) { // http request returns success
                        response.features.map((x) => {
                            const text = x.text; // get popup text message for each marker
                            var center = x.center; // get position of marker
                            const popup = new mapboxgl.Popup().setText(text) // create a popup shows text
                            marker = new mapboxgl.Marker().setLngLat(center).setPopup(popup).addTo(map); // create a marker with popup message
                            currentMarker.push(marker); // store previous marker
                            $(document).on('click', '.catItem', function (e) {
                                if (currentMarker !== null) {
                                    for (let i = currentMarker.length - 1; i >= 0; i--) {
                                        currentMarker[i].remove() // remove previous marker to add new one
                                    }
                                }
                            })
                            $(document).on('click', '.appendInput', function (e) {
                                if (currentMarker !== null) {
                                    for (let i = currentMarker.length - 1; i >= 0; i--) {
                                        currentMarker[i].remove() // remove previous marker to add custom marker
                                    }
                                }

                            })
                        })


                    }

                })
            }

        }
        $(document).click(function (e) { // hide categories to click on body except categories button
            document.getElementById('search').value = ''
            if (!$(e.target).hasClass("btn" && "appendInput") // check if event generated , not on the categories search button
                && !$(e.target).parents(".catLists").length !== 0) { // either event belongs to parent ?
                $(".catLists").hide(); // hide categories
            }
        })
        mapboxgl.accessToken = 'pk.eyJ1IjoiaGFyZGV2ZXJpY2siLCJhIjoiY2lyZmNta20wMDA4dWc5bmV1cWduOWxvNSJ9.eJRT3Wys7QU3GvqRmUMYsw';
        const map = new mapboxgl.Map({
            container: 'myMap', // Container ID
            style: 'mapbox://styles/mapbox/streets-v11', // Map style to use
            center: [-95.36201477050782, 29.74887863492847], // Starting position [lng, lat]
            zoom: 12, // Starting zoom level,
        });
        $(document).on('click', '.catItem', function (e) {
            const value = encodeURIComponent(e.currentTarget.innerHTML); // user selectede value
            document.getElementById('selectedCat').value = decodeURIComponent(value);
        })
        $(document).on('click', '#searchCategory', function () {
            const value = encodeURIComponent(document.getElementById('selectedCat').value);
            const LanLat = map.getBounds().toArray(); // get longitude & latitude (boundries) from map
            const dbox = encodeURIComponent(LanLat[0].join(',') + ',' + LanLat[1].join(',')) // convert into sting
            $.ajax('https://api.mapbox.com/geocoding/v5/mapbox.places/' + value + '.json?type=poi&bbox=' + dbox + '&access_token=pk.eyJ1IjoiaGFyZGV2ZXJpY2siLCJhIjoiY2lyZmNta20wMDA4dWc5bmV1cWduOWxvNSJ9.eJRT3Wys7QU3GvqRmUMYsw', {
                success: function (response) { // http request returns success
                    response.features.map((x) => {
                        const text = x.text; // get popup text message for each marker
                        var center = x.center; // get position of marker
                        const popup = new mapboxgl.Popup().setText(text) // create a popup shows text
                        marker = new mapboxgl.Marker().setLngLat(center).setPopup(popup).addTo(map); // create a marker with popup message
                        currentMarker.push(marker); // store previous marker
                        $(document).on('click', '.catItem', function (e) {
                            if (currentMarker !== null) {
                                for (let i = currentMarker.length - 1; i >= 0; i--) {
                                    currentMarker[i].remove() // remove previous marker to add new one
                                }
                            }
                        })
                        $(document).on('click', '.appendInput', function (e) {
                            if (currentMarker !== null) {

                                    currentMarker[i].remove() // remove previous marker to add custom marker
                                }
                            }

                        })
                    })

            })
        })
